name: Update Neon World Clock

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-clock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate neon world clock SVG
        run: |
          mkdir -p assets

          python3 << 'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from pathlib import Path
          import html

          cities = [
              ("🇺🇸", "New York", "America/New_York"),
              ("🇯🇵", "Tokyo", "Asia/Tokyo"),
              ("🇷🇺", "Moscow", "Europe/Moscow"),
              ("🇦🇪", "Dubai", "Asia/Dubai"),
          ]

          now_utc = datetime.now(ZoneInfo("UTC"))
          updated = now_utc.strftime("%Y-%m-%d %H:%M UTC")

          cards = []
          x_positions = [60, 355, 650, 945]

          for i, ((flag, city, tz), x) in enumerate(zip(cities, x_positions)):
              now = datetime.now(ZoneInfo(tz))
              time_text = now.strftime("%H:%M")
              sec_text = now.strftime("%S")
              date_text = now.strftime("%a, %d %b")
              tz_short = now.tzname() or tz

              cards.append(f'''
              <g class="card" transform="translate({x}, 145)">
                <rect x="0" y="0" width="245" height="170" rx="22" class="card-bg"/>
                <text x="122" y="45" text-anchor="middle" class="city">{flag} {html.escape(city)}</text>
                <text x="122" y="100" text-anchor="middle" class="time">{time_text}<tspan class="seconds">:{sec_text}</tspan></text>
                <text x="122" y="132" text-anchor="middle" class="date">{html.escape(date_text)} · {html.escape(tz_short)}</text>
                <circle cx="30" cy="140" r="5" class="pulse-dot"/>
              </g>
              ''')

          svg = f'''<svg width="1250" height="390" viewBox="0 0 1250 390" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="50%" stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#39ff14"/>
              </linearGradient>

              <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="50%" stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#39ff14"/>
              </linearGradient>

              <filter id="glow">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <filter id="softGlow">
                <feGaussianBlur stdDeviation="8" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>

              <style>
                .bg {{
                  fill: #070b13;
                }}

                .frame {{
                  fill: rgba(10, 15, 25, 0.92);
                  stroke: url(#lineGrad);
                  stroke-width: 2;
                }}

                .title {{
                  font-family: 'Segoe UI', Ubuntu, Arial, sans-serif;
                  font-size: 46px;
                  font-weight: 800;
                  letter-spacing: 8px;
                  fill: url(#titleGrad);
                  filter: url(#glow);
                }}

                .subtitle {{
                  font-family: 'Segoe UI', Ubuntu, Arial, sans-serif;
                  font-size: 15px;
                  letter-spacing: 5px;
                  fill: #94a3b8;
                }}

                .card-bg {{
                  fill: rgba(15, 23, 42, 0.78);
                  stroke: rgba(34, 211, 238, 0.75);
                  stroke-width: 1.5;
                  filter: url(#softGlow);
                }}

                .city {{
                  font-family: 'Segoe UI', Ubuntu, Arial, sans-serif;
                  font-size: 22px;
                  font-weight: 700;
                  fill: #e2e8f0;
                }}

                .time {{
                  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
                  font-size: 46px;
                  font-weight: 800;
                  fill: #22d3ee;
                  filter: url(#glow);
                }}

                .seconds {{
                  font-size: 26px;
                  fill: #a855f7;
                }}

                .date {{
                  font-family: 'Segoe UI', Ubuntu, Arial, sans-serif;
                  font-size: 14px;
                  fill: #94a3b8;
                }}

                .updated {{
                  font-family: 'SFMono-Regular', Consolas, monospace;
                  font-size: 13px;
                  fill: #64748b;
                }}

                .orbit {{
                  stroke: #22d3ee;
                  stroke-width: 1.2;
                  opacity: 0.55;
                  filter: url(#glow);
                }}

                .pulse-dot {{
                  fill: #39ff14;
                  filter: url(#glow);
                }}

                .beam {{
                  stroke: url(#lineGrad);
                  stroke-width: 3;
                  filter: url(#glow);
                  stroke-dasharray: 30 14;
                  animation: dash 2.5s linear infinite;
                }}

                .particle {{
                  fill: #a855f7;
                  filter: url(#glow);
                  animation: blink 1.7s ease-in-out infinite;
                }}

                @keyframes dash {{
                  from {{ stroke-dashoffset: 0; }}
                  to {{ stroke-dashoffset: -88; }}
                }}

                @keyframes blink {{
                  0%, 100% {{ opacity: 0.25; }}
                  50% {{ opacity: 1; }}
                }}
              </style>
            </defs>

            <rect class="bg" width="1250" height="390" rx="28"/>
            <rect class="frame" x="18" y="18" width="1214" height="354" rx="26"/>

            <circle cx="115" cy="74" r="42" class="orbit"/>
            <ellipse cx="115" cy="74" rx="74" ry="20" class="orbit" transform="rotate(25 115 74)"/>
            <ellipse cx="115" cy="74" rx="74" ry="20" class="orbit" transform="rotate(-35 115 74)"/>
            <circle cx="115" cy="74" r="8" class="particle"/>

            <circle cx="1135" cy="74" r="42" class="orbit"/>
            <ellipse cx="1135" cy="74" rx="76" ry="18" class="orbit" transform="rotate(-25 1135 74)"/>
            <ellipse cx="1135" cy="74" rx="76" ry="18" class="orbit" transform="rotate(35 1135 74)"/>
            <circle cx="1135" cy="74" r="8" class="particle"/>

            <text x="625" y="78" text-anchor="middle" class="title">WORLD CLOCK</text>
            <text x="625" y="112" text-anchor="middle" class="subtitle">NEW YORK • TOKYO • MOSCOW • DUBAI</text>

            <line x1="80" y1="335" x2="1170" y2="335" class="beam"/>

            {''.join(cards)}

            <text x="625" y="360" text-anchor="middle" class="updated">Last update: {html.escape(updated)} · auto-refresh by GitHub Actions</text>
          </svg>
          '''

          Path("assets/world-clock.svg").write_text(svg, encoding="utf-8")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/world-clock.svg
          git commit -m "Update neon world clock" || exit 0
          git push
